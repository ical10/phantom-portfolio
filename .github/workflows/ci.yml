name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel older runs on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck web
        run: pnpm --filter web exec tsc --noEmit
      - name: Typecheck chat-api
        run: pnpm --filter chat-api exec tsc --noEmit
      - name: Test (with coverage)
        run: pnpm test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: >-
            apps/chat-api/coverage/lcov.info,
            apps/web/coverage/lcov.info,
            packages/shared/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Build web
        run: pnpm --filter web build
      - name: Build chat-api
        run: pnpm --filter chat-api build
